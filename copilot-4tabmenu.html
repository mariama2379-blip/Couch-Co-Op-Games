<header class="site-header">
  <div class="logo">MySite</div>

  <button class="menu-toggle" aria-label="Open menu" aria-expanded="false">
    <span></span>
    <span></span>
    <span></span>
  </button>

  <nav class="nav">
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Services</a>
    <a href="#">Contact</a>
  </nav>
  <style>
    /* Reset basics */
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

.site-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1rem 1.5rem;
  background: #111;
  color: #fff;
}

.logo {
  font-size: 1.25rem;
  font-weight: bold;
}

/* Navigation */
.nav {
  display: flex;
  gap: 1.5rem;
}

.nav a {
  color: #fff;
  text-decoration: none;
}

/* Hamburger button */
.menu-toggle {
  display: none;
  flex-direction: column;
  gap: 5px;
  background: none;
  border: none;
  cursor: pointer;
}

.menu-toggle span {
  width: 25px;
  height: 3px;
  background: #fff;
}

/* Mobile styles */
@media (max-width: 768px) {
  .menu-toggle {
    display: flex;
  }

  .nav {
    position: absolute;
    top: 64px;
    right: 0;
    background: #111;
    width: 100%;
    flex-direction: column;
    align-items: center;
    display: none;
    padding: 1rem 0;
  }

  .nav.open {
    display: flex;
  }
}
  </style>
</header>
